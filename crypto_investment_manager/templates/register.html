{% extends "base.html" %}
{% block title %}Register – Crypto Investment Manager{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="text-center mb-4">
        <div class="auth-logo">
            <i class="bi bi-currency-bitcoin"></i>
        </div>
        <h3 class="mt-3 fw-bold">Create Account</h3>
        <p class="text-muted">Join CryptoManager today</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Choose a username" required autofocus>
            </div>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="your@email.com" required>
            </div>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Create a password" required>
            </div>
        </div>
        <div class="mb-4">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                       placeholder="Confirm your password" required>
            </div>
        </div>
        <button type="submit" class="btn btn-accent w-100 fw-bold py-2">
            <i class="bi bi-person-plus me-1"></i> Create Account
        </button>
    </form>

    <div class="text-center mt-4">
        <p class="text-muted mb-0">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" class="text-accent">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
