{% extends "base.html" %}
{% block title %}Login – Crypto Investment Manager{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="text-center mb-4">
        <div class="auth-logo">
            <i class="bi bi-currency-bitcoin"></i>
        </div>
        <h3 class="mt-3 fw-bold">Welcome Back</h3>
        <p class="text-muted">Sign in to your CryptoManager account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Enter username" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Enter password" required>
            </div>
        </div>
        <button type="submit" class="btn btn-accent w-100 fw-bold py-2">
            <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
        </button>
    </form>

    <div class="text-center mt-4">
        <p class="text-muted mb-0">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" class="text-accent">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
