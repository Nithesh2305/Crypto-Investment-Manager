{% extends "base.html" %}
{% block title %}News – Crypto Investment Manager{% endblock %}
{% block page_title %}News{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <p class="text-muted mb-0">Latest cryptocurrency news and headlines</p>
    <button class="btn btn-accent btn-sm" onclick="fetchNews()">
        <i class="bi bi-arrow-clockwise me-1"></i> Refresh
    </button>
</div>

<div id="newsLoading" class="text-center py-5">
    <div class="loading-spinner"></div>
    <p class="text-muted mt-3">Fetching latest news...</p>
</div>

<div id="newsError" class="alert alert-danger" style="display:none;">
    <i class="bi bi-exclamation-triangle me-2"></i><span id="newsErrorMsg"></span>
</div>

<div id="newsGrid" class="row g-3" style="display:none;"></div>
{% endblock %}

{% block scripts %}
<script>
function timeSince(ts) {
    const seconds = Math.floor(Date.now() / 1000 - ts);
    if (seconds < 60) return seconds + "s ago";
    if (seconds < 3600) return Math.floor(seconds / 60) + "m ago";
    if (seconds < 86400) return Math.floor(seconds / 3600) + "h ago";
    return Math.floor(seconds / 86400) + "d ago";
}

function fetchNews() {
    document.getElementById("newsLoading").style.display = "block";
    document.getElementById("newsError").style.display = "none";
    document.getElementById("newsGrid").style.display = "none";

    fetch("/api/news")
        .then(r => r.json())
        .then(res => {
            document.getElementById("newsLoading").style.display = "none";
            if (!res.success) {
                document.getElementById("newsError").style.display = "block";
                document.getElementById("newsErrorMsg").textContent = res.error || "Failed to fetch news.";
                return;
            }

            const grid = document.getElementById("newsGrid");
            grid.innerHTML = "";
            res.data.forEach(article => {
                grid.innerHTML += `
                    <div class="col-md-6 col-xl-4">
                        <div class="card glass-card h-100 news-card">
                            ${article.image ? `<img src="${article.image}" class="card-img-top news-img" alt="">` : ''}
                            <div class="card-body d-flex flex-column">
                                <h6 class="card-title mb-2">
                                    <a href="${article.url}" target="_blank" rel="noopener noreferrer" class="text-light text-decoration-none news-title">
                                        ${article.title}
                                    </a>
                                </h6>
                                <p class="card-text text-muted small flex-grow-1">${article.body}</p>
                                <div class="d-flex justify-content-between align-items-center mt-2">
                                    <span class="badge bg-secondary">${article.source}</span>
                                    <small class="text-muted">${timeSince(article.published)}</small>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            grid.style.display = "flex";
        })
        .catch(err => {
            document.getElementById("newsLoading").style.display = "none";
            document.getElementById("newsError").style.display = "block";
            document.getElementById("newsErrorMsg").textContent = "Network error: " + err.message;
        });
}

document.addEventListener("DOMContentLoaded", fetchNews);
</script>
{% endblock %}
